<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Definir senha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #e0ddd5;
      --text: #1a1a1a;
      --text-muted: #888;
      --text-dim: #bbb;
      --accent: #1a1a1a;
      --accent-hover: #333;
      --red: #c0614a;
      --green: #4a8c55;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 440px;
      position: relative;
      overflow: hidden;
    }

    .card-top {
      background: var(--accent);
      padding: 28px 36px;
    }

    .brand {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .card-body {
      padding: 40px 36px;
    }

    /* ── Estados ── */
    .state { display: none; }
    .state.active { display: block; }

    /* Loading */
    .spinner {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .spinner::before {
      content: '';
      width: 16px; height: 16px;
      border: 1.5px solid var(--text-dim);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-state h2 {
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 12px;
    }

    .error-state p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .error-icon {
      font-size: 28px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    /* Form */
    .form-state h2 {
      font-size: 24px;
      font-weight: 300;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .form-state .sub {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 13px 48px 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--text); }

    .toggle-eye {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1;
      padding: 4px;
    }

    /* Strength bar */
    .strength-wrap {
      margin-top: 10px;
    }

    .strength-bar {
      height: 2px;
      background: var(--border);
      margin-bottom: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width 0.3s, background 0.3s;
    }

    .strength-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* Validation hint */
    .hint {
      font-size: 12px;
      color: var(--red);
      margin-top: 6px;
      min-height: 18px;
      font-family: 'DM Mono', monospace;
    }

    .btn-submit {
      width: 100%;
      margin-top: 24px;
      padding: 15px;
      background: var(--accent);
      color: white;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Success */
    .success-state {
      text-align: center;
    }

    .success-icon {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .success-state h2 {
      font-size: 24px;
      font-weight: 300;
      margin-bottom: 10px;
    }

    .success-state p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .footer {
      margin-top: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <p class="brand">Sistema de acesso</p>
  </div>

  <div class="card-body">

    <!-- Loading -->
    <div class="state active" id="stateLoading">
      <div class="spinner">Verificando link...</div>
    </div>

    <!-- Erro -->
    <div class="state" id="stateError">
      <div class="error-icon">✕</div>
      <div class="error-state">
        <h2>Link inválido</h2>
        <p id="errorMsg">Este link não é válido ou já foi utilizado.</p>
      </div>
    </div>

    <!-- Formulário -->
    <div class="state" id="stateForm">
      <div class="form-state">
        <h2 id="welcomeTitle">Olá!</h2>
        <p class="sub">Escolha uma senha para ativar seu acesso.</p>

        <div class="field">
          <label for="password">Nova senha</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Mínimo 8 caracteres" oninput="checkStrength()" autocomplete="new-password">
            <button class="toggle-eye" type="button" onclick="toggleVer('password', this)">👁</button>
          </div>
          <div class="strength-wrap">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span class="strength-label" id="strengthLabel">—</span>
          </div>
        </div>

        <div class="field">
          <label for="confirm">Confirmar senha</label>
          <div class="input-wrap">
            <input type="password" id="confirm" placeholder="Repita a senha" autocomplete="new-password">
            <button class="toggle-eye" type="button" onclick="toggleVer('confirm', this)">👁</button>
          </div>
          <p class="hint" id="matchHint"></p>
        </div>

        <button class="btn-submit" id="btnSalvar" onclick="definirSenha()">
          Ativar minha conta →
        </button>
      </div>
    </div>

    <!-- Sucesso -->
    <div class="state" id="stateSuccess">
      <div class="success-state">
        <div class="success-icon">✓</div>
        <h2>Senha definida!</h2>
        <p>Seu acesso foi ativado com sucesso.<br>Você já pode fazer login no sistema.</p>
      </div>
    </div>

  </div>
</div>

<p class="footer">Link de uso único · Expira em 48h</p>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  function setState(id) {
    document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function toggleVer(inputId, btn) {
    const inp = document.getElementById(inputId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function checkStrength() {
    const val = document.getElementById('password').value;
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');

    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { pct: '0%',   color: 'transparent', text: '—' },
      { pct: '25%',  color: '#c0614a',     text: 'Fraca' },
      { pct: '50%',  color: '#d4956a',     text: 'Razoável' },
      { pct: '75%',  color: '#c8b87a',     text: 'Boa' },
      { pct: '100%', color: '#4a8c55',     text: 'Forte' },
    ];

    fill.style.width = levels[score].pct;
    fill.style.background = levels[score].color;
    label.textContent = levels[score].text;
    label.style.color = levels[score].color === 'transparent' ? 'var(--text-dim)' : levels[score].color;
  }

  // Verificar token ao carregar
  (async () => {
    if (!token) {
      document.getElementById('errorMsg').textContent = 'Nenhum token encontrado neste link.';
      return setState('stateError');
    }

    try {
      const res = await fetch(`/api/convite/verificar?token=${token}`);
      const data = await res.json();

      if (!data.valid) {
        document.getElementById('errorMsg').textContent = data.error;
        return setState('stateError');
      }

      document.getElementById('welcomeTitle').textContent = `Olá, ${data.name}!`;
      setState('stateForm');
    } catch {
      document.getElementById('errorMsg').textContent = 'Erro de conexão. Tente novamente.';
      setState('stateError');
    }
  })();

  async function definirSenha() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const hint     = document.getElementById('matchHint');
    const btn      = document.getElementById('btnSalvar');

    hint.textContent = '';

    if (password.length < 8) {
      hint.textContent = 'Mínimo de 8 caracteres.';
      return;
    }

    if (password !== confirm) {
      hint.textContent = 'As senhas não coincidem.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      const res = await fetch('/api/convite/definir-senha', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });

      const data = await res.json();

      if (!res.ok) {
        hint.textContent = data.error;
        btn.disabled = false;
        btn.textContent = 'Ativar minha conta →';
        return;
      }

      setState('stateSuccess');
    } catch {
      hint.textContent = 'Erro de conexão. Tente novamente.';
      btn.disabled = false;
      btn.textContent = 'Ativar minha conta →';
    }
  }
</script>
</body>
</html>
