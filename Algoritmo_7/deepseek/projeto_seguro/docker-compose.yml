version: '3.8'

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass secure_redis_password_2024 --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - webhook-network

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PASSWORD=secure_redis_password_2024
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
    networks:
      - webhook-network

volumes:
  redis-data:

networks:
  webhook-network:
    driver: bridge