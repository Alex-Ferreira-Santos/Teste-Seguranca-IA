<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Comentários</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .comment-form {
            margin-bottom: 40px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .comments-section {
            margin-top: 30px;
        }

        .comment-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            transition: box-shadow 0.3s;
        }

        .comment-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .comment-author {
            font-weight: bold;
            color: #667eea;
        }

        .comment-date {
            color: #999;
            font-size: 14px;
        }

        .comment-content {
            color: #555;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 Deixe seu Comentário</h1>
        
        <div class="comment-form">
            <form id="commentForm">
                <div class="form-group">
                    <label for="name">Nome:</label>
                    <input type="text" id="name" name="name" required placeholder="Seu nome">
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="seu@email.com">
                </div>
                
                <div class="form-group">
                    <label for="comment">Comentário:</label>
                    <textarea id="comment" name="comment" required placeholder="Escreva seu comentário aqui..."></textarea>
                </div>
                
                <button type="submit">Enviar Comentário</button>
            </form>
        </div>
        
        <div class="comments-section">
            <h2>Comentários Recentes</h2>
            <div id="commentsList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/comments'; // Altere para sua URL
        
        // Carregar comentários ao iniciar
        document.addEventListener('DOMContentLoaded', loadComments);
        
        // Handle form submission
        document.getElementById('commentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const comment = document.getElementById('comment').value;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, comment })
                });
                
                if (response.ok) {
                    showMessage('Comentário enviado com sucesso!', 'success');
                    document.getElementById('commentForm').reset();
                    loadComments(); // Recarregar comentários
                } else {
                    const error = await response.json();
                    showMessage(error.message || 'Erro ao enviar comentário', 'error');
                }
            } catch (error) {
                showMessage('Erro de conexão com o servidor', 'error');
            }
        });
        
        async function loadComments() {
            const commentsList = document.getElementById('commentsList');
            commentsList.innerHTML = '<div class="loading">Carregando comentários...</div>';
            
            try {
                const response = await fetch(API_URL);
                const comments = await response.json();
                
                if (comments.length === 0) {
                    commentsList.innerHTML = '<div class="loading">Nenhum comentário ainda. Seja o primeiro!</div>';
                    return;
                }
                
                commentsList.innerHTML = comments.map(comment => `
                    <div class="comment-card">
                        <div class="comment-header">
                            <span class="comment-author">${escapeHtml(comment.name)}</span>
                            <span class="comment-date">${new Date(comment.created_at).toLocaleDateString('pt-BR')}</span>
                        </div>
                        <div class="comment-content">${escapeHtml(comment.comment)}</div>
                    </div>
                `).join('');
            } catch (error) {
                commentsList.innerHTML = '<div class="error">Erro ao carregar comentários</div>';
            }
        }
        
        function showMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.textContent = message;
            
            const form = document.getElementById('commentForm');
            form.parentNode.insertBefore(messageDiv, form);
            
            setTimeout(() => messageDiv.remove(), 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
