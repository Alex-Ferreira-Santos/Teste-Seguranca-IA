<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Secure File Vault</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg:        #0c0c0f;
    --surface:   #14141a;
    --border:    #2a2a38;
    --accent:    #00e5a0;
    --accent2:   #7c6aff;
    --danger:    #ff4d6d;
    --text:      #e8e8f0;
    --muted:     #6b6b88;
    --radius:    8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(124,106,255,.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 10% 90%, rgba(0,229,160,.08) 0%, transparent 60%);
  }

  header {
    max-width: 860px;
    margin: 0 auto 3rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }
  header h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -.02em;
  }
  header h1 span { color: var(--accent); }
  .badge {
    font-family: 'Space Mono', monospace;
    font-size: .65rem;
    background: rgba(0,229,160,.12);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,.3);
    padding: .2rem .5rem;
    border-radius: 20px;
    letter-spacing: .05em;
    white-space: nowrap;
  }

  .card {
    max-width: 860px;
    margin: 0 auto 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
  }
  .card h2 {
    font-size: .8rem;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  /* ── Drop zone ── */
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  #dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(0,229,160,.05);
  }
  #dropzone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  #dropzone .icon { font-size: 2rem; margin-bottom: .6rem; }
  #dropzone p { color: var(--muted); font-size: .9rem; }
  #dropzone strong { color: var(--text); }

  /* ── Token input ── */
  .field { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
  .field label { font-size: .75rem; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .field input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: .6rem .8rem;
    font-family: 'Space Mono', monospace;
    font-size: .85rem;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: var(--accent2); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: .4rem;
    font-family: 'Space Mono', monospace;
    font-size: .8rem; font-weight: 700;
    padding: .6rem 1.2rem;
    border: none; border-radius: var(--radius);
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    letter-spacing: .04em;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #0c0c0f; }
  .btn-ghost   { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .actions { display: flex; gap: .8rem; margin-top: 1rem; flex-wrap: wrap; }

  /* ── Progress ── */
  #progress-wrap { display: none; margin-top: 1rem; }
  progress {
    width: 100%; height: 6px;
    border: none; border-radius: 3px;
    background: var(--border);
    accent-color: var(--accent);
  }
  #progress-label { font-size: .75rem; font-family: 'Space Mono', monospace; color: var(--muted); margin-top: .4rem; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--surface); border: 1px solid var(--border);
    padding: .8rem 1.2rem; border-radius: var(--radius);
    font-size: .85rem; font-family: 'Space Mono', monospace;
    max-width: 340px;
    transform: translateY(120%); opacity: 0;
    transition: transform .3s, opacity .3s;
    z-index: 99;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { border-color: var(--danger); color: var(--danger); }
  #toast.success { border-color: var(--accent); color: var(--accent); }

  /* ── Gallery ── */
  #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }

  .file-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s;
    animation: fadeUp .3s ease both;
  }
  .file-card:hover { border-color: var(--accent2); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .file-preview {
    width: 100%; aspect-ratio: 16/9;
    object-fit: cover; display: block;
    background: var(--border);
  }
  .file-preview.doc-icon {
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
  }
  .file-meta { padding: .8rem; }
  .file-meta .name {
    font-size: .8rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: .3rem;
  }
  .file-meta .info {
    font-family: 'Space Mono', monospace;
    font-size: .65rem; color: var(--muted);
    display: flex; flex-direction: column; gap: .15rem;
  }
  .file-meta .hash {
    font-family: 'Space Mono', monospace;
    font-size: .6rem; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .file-meta a {
    display: inline-block; margin-top: .6rem;
    font-family: 'Space Mono', monospace; font-size: .7rem;
    color: var(--accent2); text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .15s;
  }
  .file-meta a:hover { border-color: var(--accent2); }

  #empty-state {
    text-align: center; padding: 2.5rem 1rem;
    color: var(--muted); font-size: .9rem;
    font-family: 'Space Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <h1>Secure <span>File Vault</span></h1>
  <span class="badge">OWASP hardened</span>
</header>

<!-- Auth token -->
<div class="card">
  <h2>// Autenticação</h2>
  <div class="field">
    <label>Bearer Token</label>
    <input id="token" type="password" placeholder="seu-token-aqui" value="demo-token-123" />
  </div>
</div>

<!-- Upload -->
<div class="card">
  <h2>// Upload de arquivo</h2>
  <div id="dropzone">
    <input type="file" id="file-input" accept="image/*,.pdf,.txt" />
    <div class="icon">📁</div>
    <p><strong>Arraste um arquivo</strong> ou clique para selecionar</p>
    <p style="margin-top:.3rem;font-size:.75rem">JPG · PNG · GIF · WEBP · PDF · TXT — máx 10 MB</p>
  </div>

  <div id="progress-wrap">
    <progress id="progress" value="0" max="100"></progress>
    <div id="progress-label">Enviando…</div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="upload-btn" disabled>↑ Enviar</button>
    <button class="btn btn-ghost"   id="refresh-btn">↻ Atualizar galeria</button>
  </div>
</div>

<!-- Gallery -->
<div class="card">
  <h2>// Meus arquivos</h2>
  <div id="gallery"><div id="empty-state">Nenhum arquivo ainda.</div></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API_BASE = 'http://localhost:3000';

const tokenInput   = document.getElementById('token');
const fileInput    = document.getElementById('file-input');
const dropzone     = document.getElementById('dropzone');
const uploadBtn    = document.getElementById('upload-btn');
const refreshBtn   = document.getElementById('refresh-btn');
const progressWrap = document.getElementById('progress-wrap');
const progressBar  = document.getElementById('progress');
const progressLbl  = document.getElementById('progress-label');
const gallery      = document.getElementById('gallery');
const toast        = document.getElementById('toast');

let selectedFile = null;

// ── Helpers ────────────────────────────────────────────────────────────────

function showToast(msg, type = 'success') {
  toast.textContent = msg;
  toast.className = `show ${type}`;
  setTimeout(() => { toast.className = ''; }, 4000);
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function getHeaders(extra = {}) {
  return { Authorization: `Bearer ${tokenInput.value.trim()}`, ...extra };
}

// ── File selection ─────────────────────────────────────────────────────────

function onFileSelected(file) {
  selectedFile = file;
  uploadBtn.disabled = false;
  dropzone.querySelector('p').textContent = `✔ ${file.name} (${formatBytes(file.size)})`;
}

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) onFileSelected(fileInput.files[0]);
});

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) onFileSelected(file);
});

// ── Upload ─────────────────────────────────────────────────────────────────

uploadBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  const fd = new FormData();
  fd.append('file', selectedFile);

  uploadBtn.disabled = true;
  progressWrap.style.display = 'block';
  progressBar.value = 0;
  progressLbl.textContent = 'Enviando…';

  try {
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${API_BASE}/upload`);
      xhr.setRequestHeader('Authorization', `Bearer ${tokenInput.value.trim()}`);

      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          const pct = Math.round(e.loaded / e.total * 100);
          progressBar.value = pct;
          progressLbl.textContent = `${pct}%`;
        }
      };

      xhr.onload = () => {
        if (xhr.status === 201) {
          const data = JSON.parse(xhr.responseText);
          progressBar.value = 100;
          progressLbl.textContent = 'Concluído ✔';
          showToast(`Arquivo enviado! SHA-256: ${data.sha256.slice(0,16)}…`);
          setTimeout(() => { progressWrap.style.display = 'none'; }, 1500);
          loadGallery();
          resolve();
        } else {
          reject(new Error(JSON.parse(xhr.responseText).error || 'Erro no upload'));
        }
      };
      xhr.onerror = () => reject(new Error('Falha de rede'));
      xhr.send(fd);
    });
  } catch (err) {
    showToast(err.message, 'error');
    progressWrap.style.display = 'none';
  } finally {
    uploadBtn.disabled = false;
    selectedFile = null;
    fileInput.value = '';
    dropzone.querySelector('p').textContent = 'Arraste um arquivo ou clique para selecionar';
  }
});

// ── Gallery ────────────────────────────────────────────────────────────────

const ICONS = { 'application/pdf': '📄', 'text/plain': '📝' };

async function loadGallery() {
  try {
    const res = await fetch(`${API_BASE}/files`, { headers: getHeaders() });
    if (!res.ok) throw new Error((await res.json()).error);
    const files = await res.json();

    if (!files.length) {
      gallery.innerHTML = '<div id="empty-state">Nenhum arquivo ainda.</div>';
      return;
    }

    gallery.innerHTML = '';
    for (const f of files) {
      const card = document.createElement('div');
      card.className = 'file-card';
      const isImage = f.mimeType.startsWith('image/');
      const previewHTML = isImage
        ? `<img class="file-preview" src="${API_BASE}${f.url}" alt="${f.originalName}" loading="lazy" />`
        : `<div class="file-preview doc-icon">${ICONS[f.mimeType] || '📦'}</div>`;

      card.innerHTML = `
        ${previewHTML}
        <div class="file-meta">
          <div class="name" title="${f.originalName}">${f.originalName}</div>
          <div class="info">
            <span>${f.mimeType}</span>
            <span>${formatBytes(f.size)}</span>
          </div>
          <div class="hash" title="SHA-256: ${f.sha256}">SHA-256: ${f.sha256.slice(0,32)}…</div>
          <a href="${API_BASE}${f.url}" target="_blank" rel="noopener noreferrer">→ abrir arquivo</a>
        </div>`;
      gallery.appendChild(card);
    }
  } catch (err) {
    showToast(err.message, 'error');
  }
}

refreshBtn.addEventListener('click', loadGallery);
loadGallery();
</script>
</body>
</html>
