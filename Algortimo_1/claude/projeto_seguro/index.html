<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --border:    #272b38;
      --accent:    #c8a96e;
      --accent2:   #e8c98e;
      --text:      #e8e4dc;
      --muted:     #6b7280;
      --error:     #f87171;
      --success:   #6ee7b7;
      --radius:    14px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* ---- Fundo animado ---- */
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -20%; left: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(200,169,110,.12) 0%, transparent 70%);
      animation: drift 12s ease-in-out infinite alternate;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -20%; right: -10%;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(100,130,200,.08) 0%, transparent 70%);
      animation: drift 16s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(4%,3%) scale(1.05); }
    }

    /* ---- Card ---- */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) * 1.5);
      padding: 48px 44px 44px;
      box-shadow: 0 32px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03) inset;
      animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ---- Ícone do logo ---- */
    .logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 8px 24px rgba(200,169,110,.3);
    }
    .logo svg { width: 24px; height: 24px; }

    /* ---- Títulos ---- */
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: .875rem;
      color: var(--muted);
      margin-bottom: 36px;
    }

    /* ---- Campos ---- */
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--muted); pointer-events: none;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .925rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,169,110,.15);
    }
    input::placeholder { color: #3a3f50; }

    /* toggle senha */
    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px; display: flex; align-items: center;
    }
    .toggle-pw:hover { color: var(--accent); }

    /* ---- Botão ---- */
    button[type="submit"] {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d0f14;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: .95rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button[type="submit"]:hover  { opacity: .92; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }
    button[type="submit"]:disabled { opacity: .5; cursor: not-allowed; }

    /* ---- Spinner ---- */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,.2);
      border-top-color: #0d0f14;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }
    .loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Mensagem de feedback ---- */
    .alert {
      display: none;
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: .875rem;
      font-weight: 500;
      text-align: center;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform:none;} }
    .alert.erro    { background: rgba(248,113,113,.1); color: var(--error);   border: 1px solid rgba(248,113,113,.25); }
    .alert.sucesso { background: rgba(110,231,183,.1); color: var(--success); border: 1px solid rgba(110,231,183,.25); }

    /* ---- Painel pós-login ---- */
    .painel {
      display: none;
      text-align: center;
    }
    .painel h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .painel p { color: var(--muted); font-size: .9rem; margin-bottom: 28px; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(110,231,183,.1);
      color: var(--success);
      border: 1px solid rgba(110,231,183,.25);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: .8rem;
      font-weight: 500;
      margin-bottom: 28px;
    }
    .btn-sair {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 10px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-sair:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; margin: 16px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="card">

    <!-- ===== TELA DE LOGIN ===== -->
    <div id="tela-login">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Bem-vindo<br/><em>de volta</em></h1>
      <p class="subtitle">Acesse sua conta com segurança.</p>

      <form id="formLogin" novalidate>
        <input type="hidden" id="csrf_token" name="csrf_token" />

        <div class="field">
          <label for="email">E-mail</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required />
          </div>
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="senha" name="senha" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-pw" id="toggleSenha" aria-label="Mostrar senha">
              <svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="btnLogin">
          <div class="spinner"></div>
          <span class="btn-label">Entrar</span>
        </button>

        <div class="alert" id="alerta"></div>
      </form>
    </div>

    <!-- ===== TELA PÓS-LOGIN ===== -->
    <div class="painel" id="painel">
      <div class="badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Sessão autenticada
      </div>
      <h2>Olá, <span id="nomeUsuario"></span>!</h2>
      <p>Você está conectado com sucesso.</p>
      <button class="btn-sair" id="btnSair">Sair da conta</button>
    </div>

  </div>

  <script>
    // ============================================================
    //  FRONTEND SEGURO — sem senhas em localStorage, sem dados
    //  sensíveis expostos, comunicação via POST com token CSRF
    // ============================================================

    const API = 'login.php'; // mesmo diretório

    const formLogin    = document.getElementById('formLogin');
    const btnLogin     = document.getElementById('btnLogin');
    const alerta       = document.getElementById('alerta');
    const telaLogin    = document.getElementById('tela-login');
    const painel       = document.getElementById('painel');
    const nomeUsuario  = document.getElementById('nomeUsuario');
    const btnSair      = document.getElementById('btnSair');
    const toggleSenha  = document.getElementById('toggleSenha');
    const inputSenha   = document.getElementById('senha');

    // ---- Mostrar/ocultar mensagem de feedback -----------------
    function mostrarAlerta(msg, tipo) {
      alerta.textContent = msg;
      alerta.className = `alert ${tipo}`;
      alerta.style.display = 'block';
    }
    function ocultarAlerta() {
      alerta.style.display = 'none';
    }

    // ---- Toggle de visibilidade da senha ----------------------
    toggleSenha.addEventListener('click', () => {
      const visivel = inputSenha.type === 'text';
      inputSenha.type = visivel ? 'password' : 'text';
      toggleSenha.setAttribute('aria-label', visivel ? 'Mostrar senha' : 'Ocultar senha');
    });

    // ---- Buscar token CSRF ao carregar a página ---------------
    async function buscarCSRF() {
      try {
        const r = await fetch(`${API}?acao=csrf_token`);
        const d = await r.json();
        document.getElementById('csrf_token').value = d.token;
      } catch {
        // silencioso — servidor vai rejeitar se falhar
      }
    }

    // ---- Verificar sessão existente ---------------------------
    async function verificarSessao() {
      try {
        const r = await fetch(`${API}?acao=verificar`);
        const d = await r.json();
        if (d.logado) mostrarPainel(d.nome);
      } catch {
        /* offline ou erro — mostra login normalmente */
      }
    }

    function mostrarPainel(nome) {
      telaLogin.style.display = 'none';
      nomeUsuario.textContent = nome;
      painel.style.display    = 'block';
    }

    // ---- Envio do formulário ----------------------------------
    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      ocultarAlerta();

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const csrf  = document.getElementById('csrf_token').value;

      // Validação básica no cliente (não substitui a do servidor)
      if (!email || !senha) {
        mostrarAlerta('Preencha todos os campos.', 'erro');
        return;
      }

      btnLogin.classList.add('loading');
      btnLogin.disabled = true;

      try {
        const corpo = new URLSearchParams({
          acao: 'login',
          email,
          senha,
          csrf_token: csrf,
        });

        const r = await fetch(API, { method: 'POST', body: corpo });
        const d = await r.json();

        if (d.ok) {
          mostrarAlerta('Login realizado!', 'sucesso');
          setTimeout(() => {
            // Redirecione aqui para a área logada do seu site:
            // window.location.href = '/dashboard.php';
            verificarSessao();
          }, 800);
        } else {
          mostrarAlerta(d.mensagem || 'Credenciais inválidas.', 'erro');
          // Renovar token CSRF após erro
          buscarCSRF();
        }
      } catch {
        mostrarAlerta('Erro de conexão. Tente novamente.', 'erro');
      } finally {
        btnLogin.classList.remove('loading');
        btnLogin.disabled = false;
        document.getElementById('senha').value = ''; // limpar senha da memória
      }
    });

    // ---- Logout ----------------------------------------------
    btnSair.addEventListener('click', async () => {
      await fetch(`${API}?acao=logout`);
      painel.style.display    = 'none';
      telaLogin.style.display = 'block';
      ocultarAlerta();
      buscarCSRF();
    });

    // ---- Inicializar -----------------------------------------
    buscarCSRF();
    verificarSessao();
  </script>
</body>
</html>
